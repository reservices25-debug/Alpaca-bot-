name: Run Institutional Alpaca Bot

on:
  schedule:
    - cron: "*/10 * * * 1-5"   # runs every 10 minutes (forces GitHub to trigger)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python bot.py

      - name: Upload bot logs
        uses: actions/upload-artifact@v4
        with:
          name: bot-reports
          path: |
            trade_log.csv
            portfolio_snapshot.csv
            risk_report.txt
