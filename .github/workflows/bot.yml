name: Run Hybrid Alpaca Bot

on:
  schedule:
    - cron: "*/15 14-20 * * 1-5"   # every 15 min during NY market hours, approx. 9AM-4PM ET
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alpaca bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python bot.py
