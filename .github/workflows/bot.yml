name: Run Hybrid Alpaca Bot

on:
  schedule:
    - cron: "35 13 * * 1-5"   # weekday stock-market run, 9:35 AM NY during EDT
    - cron: "0 */4 * * *"     # every 4 hours for crypto/hybrid checks
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alpaca bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python bot.py
